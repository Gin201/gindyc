  function bindTabs(selector,prefix,attr){const tabs=[...document.querySelectorAll(selector)];tabs.forEach((tab,index)=>{tab.addEventListener('click',()=>activate(tab));tab.addEventListener('keydown',e=>{if(!['ArrowLeft','ArrowRight','Home','End'].includes(e.key))return;e.preventDefault();let n=e.key==='Home'?0:e.key==='End'?tabs.length-1:(index+(e.key==='ArrowRight'?1:-1)+tabs.length)%tabs.length;tabs[n].focus();activate(tabs[n])})});function activate(tab){tabs.forEach(t=>{const active=t===tab;t.setAttribute('aria-selected',active);document.getElementById(prefix+t.getAttribute(attr)).hidden=!active})}}

  async function uploadCertificateFiles(files){const valid=[...files].filter(f=>['image/png','image/jpeg','image/webp'].includes(f.type));const status=document.getElementById('uploadStatus');if(!valid.length){status.textContent='没有检测到可上传的图片';return}let done=0;for(const file of valid){if(file.size>10*1024*1024){showToast(`${file.name} 超过 10MB，已跳过`);continue}status.textContent=`正在上传 ${done+1} / ${valid.length}：${file.name}`;try{const data=await fileToDataUrl(file);const res=await fetch('/api/certificates',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:file.name,data})});const result=await res.json();if(!res.ok)throw new Error(result.error||'上传失败');done++}catch(e){showToast(e.message||`${file.name} 上传失败`)}}status.textContent=`已成功加入 ${done} 张证书`;await loadUploadedCertificates();if(done){showToast(`已加入 ${done} 张证书`);setTimeout(()=>document.getElementById('uploadModal').classList.remove('open'),700)}}
  function bindCertificateUploader(){const modal=document.getElementById('uploadModal'),zone=document.getElementById('pasteZone'),input=document.getElementById('certFileInput');const open=()=>{modal.classList.add('open');document.body.style.overflow='hidden';setTimeout(()=>zone.focus(),50)},close=()=>{modal.classList.remove('open');document.body.style.overflow=''};document.getElementById('pasteCertBtn').addEventListener('click',open);document.getElementById('uploadClose').addEventListener('click',close);document.getElementById('chooseImagesBtn').addEventListener('click',()=>input.click());input.addEventListener('change',()=>{uploadCertificateFiles(input.files);input.value=''});document.addEventListener('paste',e=>{if(!modal.classList.contains('open'))return;const files=[...e.clipboardData.items].filter(i=>i.kind==='file'&&i.type.startsWith('image/')).map(i=>i.getAsFile()).filter(Boolean);if(files.length){e.preventDefault();uploadCertificateFiles(files)}});document.getElementById('clipboardBtn').addEventListener('click',async()=>{try{const items=await navigator.clipboard.read(),files=[];for(const item of items)for(const type of item.types)if(type.startsWith('image/'))files.push(new File([await item.getType(type)],`粘贴证书-${Date.now()}.${type.split('/')[1].replace('jpeg','jpg')}`,{type}));if(files.length)uploadCertificateFiles(files);else document.getElementById('uploadStatus').textContent='剪贴板里没有图片，请先复制证书图片'}catch(e){document.getElementById('uploadStatus').textContent='请在虚线框内按 Ctrl / ⌘ + V，或从相册选择'}});['dragenter','dragover'].forEach(n=>zone.addEventListener(n,e=>{e.preventDefault();zone.classList.add('drag')}));['dragleave','drop'].forEach(n=>zone.addEventListener(n,e=>{e.preventDefault();zone.classList.remove('drag')}));zone.addEventListener('drop',e=>uploadCertificateFiles(e.dataTransfer.files));modal.addEventListener('click',e=>{if(e.target===modal)close()})}
  function bindReveal(){if(matchMedia('(prefers-reduced-motion: reduce)').matches){document.querySelectorAll('.reveal').forEach(x=>x.classList.add('visible'));return}const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target)}}),{threshold:.08});document.querySelectorAll('.reveal').forEach(x=>io.observe(x))}
  async function copyEmail(email){try{await navigator.clipboard.writeText(email);showToast('邮箱已复制')}catch(e){const t=document.createElement('textarea');t.value=email;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();showToast('邮箱已复制')}}
  let toastTimer;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1800)}
  function applyTheme(theme){document.documentElement.dataset.theme=theme;document.querySelector('meta[name=theme-color]').content=theme==='dark'?'#0d1713':'#f5f7f2';document.getElementById('themeBtn').innerHTML=icon(theme==='dark'?'sun':'moon');try{localStorage.setItem('resume-theme',theme)}catch(e){}}
  render();
  const saved=(()=>{try{return localStorage.getItem('resume-theme')}catch(e){return null}})();applyTheme(saved||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));
  document.getElementById('printBtn').innerHTML=icon('print');document.getElementById('menuBtn').innerHTML=icon('menu');
  document.getElementById('themeBtn').addEventListener('click',()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));document.getElementById('printBtn').addEventListener('click',()=>window.print());
  const menu=document.getElementById('mobileMenu'),menuBtn=document.getElementById('menuBtn');menuBtn.addEventListener('click',()=>{const open=menu.classList.toggle('open');menuBtn.setAttribute('aria-expanded',open)});menu.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{menu.classList.remove('open');menuBtn.setAttribute('aria-expanded','false')}));
  const closeLightbox=()=>{document.getElementById('lightbox').classList.remove('open');document.body.style.overflow=''};document.getElementById('lightboxClose').addEventListener('click',closeLightbox);document.getElementById('lightbox').addEventListener('click',e=>{if(e.target.id==='lightbox')closeLightbox()});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLightbox();document.getElementById('uploadModal').classList.remove('open');document.body.style.overflow=''}});
  const topBtn=document.getElementById('topBtn');topBtn.addEventListener('click',()=>scrollTo({top:0,behavior:'smooth'}));addEventListener('scroll',()=>topBtn.classList.toggle('show',scrollY>650),{passive:true});
  const links=[...document.querySelectorAll('.nav-links a')];const sections=links.map(a=>document.querySelector(a.getAttribute('href'))).filter(Boolean);const navObs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){links.forEach(a=>a.classList.toggle('active',a.getAttribute('href')==='#'+e.target.id))}}),{rootMargin:'-30% 0px -60%'});sections.forEach(s=>navObs.observe(s));
  </script>
</body>
