    function safeImage(m,cls='') {

      const src = base + m.file;

      return `<picture><source srcset="${webpSrc}" type="image/webp"><img class="${cls}" src="${src}" alt="${m.title}" loading="lazy" decoding="async" onerror="imageFallback(this)"></picture>`;
    }
    function imageFallback(img){const p=img.closest('picture');if(p){p.outerHTML=`<div class="img-placeholder">${icon('image')}<span>将 ${img.getAttribute('src')} 与本页放在同一目录即可显示</span></div>`}}

      <div style="height:48px"></div><div class="tabs" role="tablist" aria-label="证书与文档分类"><button class="tab" role="tab" aria-selected="true" aria-controls="cred-featured" data-cred-tab="featured">精选荣誉</button><button class="tab" role="tab" aria-selected="false" aria-controls="cred-ai" data-cred-tab="ai">AI 证书墙</button><button class="tab" role="tab" aria-selected="false" aria-controls="cred-docs" data-cred-tab="docs">思考文档</button></div>

    function bindTabs(selector,prefix,attr){const tabs=[...document.querySelectorAll(selector)];tabs.forEach((tab,index)=>{tab.addEventListener('click',()=>activate(tab));tab.addEventListener('keydown',e=>{if(!['ArrowLeft','ArrowRight','Home','End'].includes(e.key))return;e.preventDefault();let n=e.key==='Home'?0:e.key==='End'?tabs.length-1:(index+(e.key==='ArrowRight'?1:-1)+tabs.length)%tabs.length;tabs[n].focus();activate(tabs[n])})});function activate(tab){tabs.forEach(t=>{const active=t===tab;t.setAttribute('aria-selected',active);document.getElementById(prefix+t.getAttribute(attr)).hidden=!active})}}
    function bindMedia(){document.querySelectorAll('.media-card').forEach(card=>{const open=()=>{const img=card.querySelector('img');if(!img)return;document.getElementById('lightboxImg').src=img.currentSrc||img.src;document.getElementById('lightboxImg').alt=card.dataset.title;document.getElementById('lightboxCaption').textContent=card.dataset.title;document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';document.getElementById('lightboxClose').focus()};card.addEventListener('click',open);card.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open()}})})}
    function bindReveal(){if(matchMedia('(prefers-reduced-motion: reduce)').matches){document.querySelectorAll('.reveal').forEach(x=>x.classList.add('visible'));return}const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target)}}),{threshold:.08});document.querySelectorAll('.reveal').forEach(x=>io.observe(x))}
    async function copyEmail(email){try{await navigator.clipboard.writeText(email);showToast('邮箱已复制')}catch(e){const t=document.createElement('textarea');t.value=email;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();showToast('邮箱已复制')}}
    let toastTimer;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1800)}
    function applyTheme(theme){document.documentElement.dataset.theme=theme;document.querySelector('meta[name=theme-color]').content=theme==='dark'?'#0d1713':'#f5f7f2';document.getElementById('themeBtn').innerHTML=icon(theme==='dark'?'sun':'moon');try{localStorage.setItem('resume-theme',theme)}catch(e){}}

    const links=[...document.querySelectorAll('.nav-links a')];const sections=links.map(a=>document.querySelector(a.getAttribute('href'))).filter(Boolean);const navObs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){links.forEach(a=>a.classList.toggle('active',a.getAttribute('href')==='#'+e.target.id))}}),{rootMargin:'-30% 0px -60%'});sections.forEach(s=>navObs.observe(s));
